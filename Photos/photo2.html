<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="../Images/aerotigers-logo.webp">
        <script src="https://kit.fontawesome.com/040299a7da.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="photo2.css">
    </head>
    <body>
        <div class="topbar">
            <a href="photos.html" class="iconbtn" id="closebtn" aria-label="Close">
                <i class="fa-solid fa-xmark"></i>
            </a>
            <span id="photocounter"></span>
            <button class="iconbtn" id="fullscreen" aria-label="Fullscreen">
                <i class="fa-solid fa-expand"></i>
            </button>
        </div>
        <div class="viewer" id="viewer">
            <button class="navbtn" id="prevbtn" aria-label="Previous image">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <img src="" id="image1" alt="Photo">
            <button class="navbtn" id="nextbtn" aria-label="Next image">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>
        <script src="photo2.js"></script>
    </body>
</html>
